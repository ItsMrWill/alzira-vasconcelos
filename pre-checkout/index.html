<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha a forma de pagamento — Renovação NVM</title>
  <meta name="description" content="Escolha a forma de pagamento para renovar sua participação no NVM com Alzira Vasconcelos." />
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Big+Shoulders+Display:wght@400;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Italianno&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles.css" />

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-MC8MKSW');</script>
  <!-- End Google Tag Manager -->

  <style>
    /* Identidade da Renovação NVM — vermelho */
    :root { --red: #C0392B; --red-2: #E04A38; --red-deep: #9E2A1C; --red-panel: rgba(0,0,0,.20); }

    /* ===== Mobile first — tudo em uma dobra ===== */
    .prechk {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 0;
      display: flex;
      align-items: center;
      background:
        radial-gradient(120% 90% at 25% 15%, rgba(192,57,43,.85) 0%, rgba(158,42,28,.35) 42%, rgba(0,0,0,0) 70%),
        linear-gradient(150deg, #8E2416 0%, #5A1710 45%, #1A0906 100%);
    }
    .prechk .container {
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    /* Marca */
    .prechk__brand { display: flex; align-items: baseline; gap: 12px; }
    .prechk__brand-mark {
      font-family: var(--f-logo);
      font-size: 40px;
      line-height: 1;
      letter-spacing: .04em;
      color: var(--ivory);
    }
    .prechk__brand-sub {
      font-family: var(--f-sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--ivory);
      opacity: .85;
    }

    /* Cabeçalho */
    .prechk__head { display: flex; flex-direction: column; gap: 4px; }
    .prechk__eyebrow {
      font-family: var(--f-sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--ivory);
      opacity: .8;
    }
    .prechk__title {
      font-family: var(--f-display);
      font-weight: 900;
      font-size: 30px;
      line-height: 1.05;
      color: var(--ivory);
    }

    /* Opções */
    .pay-options { display: flex; flex-direction: column; gap: 12px; }
    .pay-option {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 16px 18px;
      border: 1px solid rgba(244,239,231,.28);
      background: var(--red-panel);
      transition: border-color .2s, transform .2s;
    }
    .pay-option:hover { border-color: var(--ivory); transform: translateY(-2px); }
    .pay-option__label {
      font-family: var(--f-display);
      font-weight: 900;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--ivory);
    }
    .pay-option__price {
      font-family: var(--f-sans);
      font-size: 13px;
      font-weight: 700;
      color: var(--ivory);
      opacity: .9;
      line-height: 1.35;
    }
    .pay-option .cta {
      margin-top: 12px;
      padding: 16px 24px;
      font-size: 12px;
      background: var(--ivory);
      color: var(--red-deep);
    }
    .pay-option .cta:hover { background: var(--onyx); color: var(--ivory); }
    .prechk__note {
      font-family: var(--f-sans);
      font-size: 12px;
      color: var(--ivory);
      opacity: .45;
      text-align: center;
      margin: 2px 0 0;
    }

    /* ===== Desktop — duas colunas ===== */
    @media (min-width: 768px) {
      .prechk .container {
        flex-direction: row;
        align-items: center;
        gap: 80px;
        padding: 48px 64px;
        max-width: 1100px;
      }
      .prechk__col-left { flex: 1; }
      .prechk__col-right { flex: 1; max-width: 480px; }
      .prechk__brand-mark { font-size: 64px; }
      .prechk__brand-sub { font-size: 14px; }
      .prechk__head { margin-top: 28px; }
      .prechk__title { font-size: 48px; }
      .pay-option { padding: 22px 26px; }
      .pay-option__label { font-size: 26px; }
      .pay-option__price { font-size: 14px; }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MC8MKSW"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <section class="section section--onyx prechk">
    <div class="corner-mark corner-mark--tl" style="border-color:var(--ivory)"></div>
    <div class="corner-mark corner-mark--tr" style="border-color:var(--ivory)"></div>
    <div class="corner-mark corner-mark--bl" style="border-color:var(--ivory)"></div>
    <div class="corner-mark corner-mark--br" style="border-color:var(--ivory)"></div>

    <div class="container">
      <div class="prechk__col-left">
        <div class="prechk__brand">
          <span class="prechk__brand-mark">NVM</span>
          <span class="prechk__brand-sub">Renovação</span>
        </div>
        <div class="prechk__head">
          <span class="prechk__eyebrow">Último passo</span>
          <h1 class="prechk__title">Escolha como quer pagar.</h1>
        </div>
      </div>

      <div class="prechk__col-right">
        <div class="pay-options">
          <div class="pay-option">
            <span class="pay-option__label">Cartão ou Pix</span>
            <span class="pay-option__price">R$ 1.297 à vista no Pix · ou 12x de R$ 138,12 no cartão</span>
            <a href="https://lastlink.com/p/CA3B7E620/checkout-payment/" target="_blank" rel="noopener" class="cta cta--full" data-checkout>Pagar com Cartão ou Pix</a>
          </div>

          <div class="pay-option">
            <span class="pay-option__label">Boleto parcelado</span>
            <span class="pay-option__price">12x de R$ 149,65</span>
            <a href="https://pay.tmb.com.br/alzira/9YO246429KK" target="_blank" rel="noopener" class="cta cta--full" data-checkout>Pagar com Boleto Parcelado</a>
          </div>
        </div>
        <p class="prechk__note">Pagamento processado em ambiente seguro.</p>
      </div>
    </div>
  </section>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var utmKeys = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', 'gclid'];

      var utms = new URLSearchParams();
      utmKeys.forEach(function(key) {
        if (params.has(key)) utms.set(key, params.get(key));
      });

      // Se a página não recebeu nenhuma UTM no GET, aplica o padrão.
      if (utms.toString() === '') {
        utms.set('utm_source', 'pre-checkout');
        utms.set('utm_medium', 'pre-checkout');
        utms.set('utm_campaign', 'nvm-ren-c19');
        utms.set('utm_content', 'pre-checkout');
        utms.set('utm_term', 'pre-checkout');
      }

      document.querySelectorAll('a[data-checkout]').forEach(function(a) {
        var url = new URL(a.href);
        utms.forEach(function(val, key) { url.searchParams.set(key, val); });
        a.href = url.toString();
      });
    })();
  </script>
</body>
</html>
